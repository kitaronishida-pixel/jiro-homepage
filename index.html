<index.html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>私の大学</title>
    <style>
        /* ここにデザイン（CSS）を書きます */
        body {
            background-color: #f0f0f2; /* 背景を少し落ち着いた薄いグレーに */
            color: #1a1a1a; /* 文字を真っ黒ではなく、目に優しい濃いグレーに */
            font-family: "MS P明朝", "ヒラギノ明朝 Pro W3", "serif"; /* 知的な明朝体フォントに */
            max-width: 800px; /* 画面が広がりすぎないように横幅を制限 */
            margin: 0 auto; /* 画面の真ん中に寄せる（センタリング） */
            padding: 20px; /* 画面の端に少し余白を作る */
            line-height: 1.8; /* 行間を広げて読みやすくする */
        }
        h1 {
            text-align: center; /* 大見出しを真ん中寄せに */
            color: #003366; /* 落ち着いた紺色に */
            border-bottom: 2px solid #003366; /* タイトルの下に線を引く */
            padding-bottom: 10px;
        }
        h2 {
            color: #333333;
            border-left: 5px solid #003366; /* 見出しの左側に縦のアクセント線を引く */
            padding-left: 10px;
            margin-top: 40px;
        }
        hr {
            border: none;
            border-top: 1px dashed #999999; /* 点線の区切り線 */
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <h1>私の大学</h1>
    
    <p style="text-align: center;">―― 小品 ――</p>

    <hr>

    <h2>はじめに</h2>
    <p>ここは、私が日々の生活を書き残すための私的な空間です。</p>
    <p>日記や小品を置いていくと思う。</p>

    <h2>ノート（目次）</h2>
    <p>準備中。</p>
    <ul>
        <li><strong>小品：</strong> 日々に</li>
        <li><strong>自然科学：</strong> 自然科学</li>
        <li><strong>文学類：</strong> 読書録等</li>
    </ul>

    <hr>
    
    <p style="text-align: center; font-size: 0.9em; color: #666666;">
        © 2026 jiro-hujimura. All Rights Reserved.
    </p>

</body>
</html>
